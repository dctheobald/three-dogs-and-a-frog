<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilience Demo | 3 Dogs and a Frog</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" onerror="this.onerror=null; this.href='/favicon.ico'">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        
        /* Enterprise Branding Header */
        .app-header { width: 100%; background-color: #1a1a1a; padding: 15px 0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 40px; }
        .brand-logo { max-height: 60px; width: auto; object-fit: contain; }
        /* Fallback text styling if the image path is wrong */
        .app-header a { text-decoration: none; color: #fff; font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }

        .dashboard { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 600px; width: 90%; margin-bottom: 40px; }
        h1 { margin-top: 0; color: #2c3e50; font-size: 1.8rem; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        p { color: #666; margin-bottom: 25px; line-height: 1.5; }
        
        .status-badge { display: inline-block; padding: 12px 25px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; margin: 10px 0 30px 0; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .healthy { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .offline { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        
        .btn-danger { background-color: #dc3545; color: white; border: none; padding: 18px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4); width: 100%; letter-spacing: 1px;}
        .btn-danger:hover { background-color: #c82333; transform: translateY(-1px); }
        .btn-danger:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(220, 53, 69, 0.4); }
        .btn-danger:disabled { cursor: not-allowed; background-color: #6c757d; box-shadow: none; opacity: 0.8; }

        /* Terminal & Controls */
        .terminal-container { margin-top: 35px; text-align: left; }
        .terminal-controls { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; color: #555; margin-bottom: 8px; font-weight: 600; padding: 0 5px; }
        .pause-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; background: #eee; padding: 5px 10px; border-radius: 5px; transition: background 0.2s;}
        .pause-toggle:hover { background: #e0e0e0; }
        .pause-toggle input { cursor: pointer; }
        .log-window { background: #1e1e1e; color: #00ff00; font-family: "Courier New", Courier, monospace; padding: 15px; border-radius: 8px; height: 220px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; box-shadow: inset 0 4px 10px rgba(0,0,0,0.6); border: 1px solid #333; }
        
        /* Custom Scrollbar for Terminal */
        .log-window::-webkit-scrollbar { width: 8px; }
        .log-window::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .log-window::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <header class="app-header">
        <a href="/">
            <img src="/images/logo.jpg" alt="3 Dogs and a Frog" class="brand-logo" onerror="this.outerHTML='<span>🏕️ 3 Dogs and a Frog</span>'">
        </a>
    </header>

    <div class="dashboard">
        <h1>System Resilience Test</h1>
        <p>Demonstrating automated Docker recovery and zero-trust edge routing under catastrophic failure conditions.</p>
        
        <div id="statusBadge" class="status-badge healthy">
            🟢 Server Online
        </div>

        <button id="crashBtn" class="btn-danger">☢️ INITIATE FATAL CRASH</button>

        <div class="terminal-container">
            <div class="terminal-controls">
                <span>>_ Live Diagnostic Logs</span>
                <label class="pause-toggle" title="Pause auto-scrolling to review logs">
                    <input type="checkbox" id="pauseAutoScroll"> Pause Auto-Scroll
                </label>
            </div>
            <div id="logWindow" class="log-window">
                > System initialized...<br>
                > Polling heartbeat endpoint...<br>
            </div>
        </div>
    </div>

    <script>
        const statusBadge = document.getElementById('statusBadge');
        const crashBtn = document.getElementById('crashBtn');
        const logWindow = document.getElementById('logWindow');
        const pauseToggle = document.getElementById('pauseAutoScroll');
        
        let isCrashing = false;
        let lastUptime = 0; 
        let logLines = ["> System initialized...", "> Polling heartbeat endpoint..."];
        const MAX_LOG_LINES = 100;

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logLines.push(`> [${time}] ${message}`);
            
            if (logLines.length > MAX_LOG_LINES) logLines.shift();
            
            // 1. Capture the exact scroll position BEFORE modifying the DOM
            const currentScrollTop = logWindow.scrollTop;
            
            // 2. Update the DOM (this naturally resets scroll position in many browsers)
            logWindow.innerHTML = logLines.join('<br>');
            
            // 3. Either force it to the bottom, or restore the captured scroll position
            if (!pauseToggle.checked) {
                logWindow.scrollTop = logWindow.scrollHeight;
            } else {
                logWindow.scrollTop = currentScrollTop;
            }
        }

        async function pollHealth() {
            try {
                const response = await fetch(`/api/health?t=${Date.now()}`);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (lastUptime > 0 && data.uptime < lastUptime) {
                        log(`⚠️ CRASH VERIFIED: Uptime plummeted from ${lastUptime.toFixed(1)}s to ${data.uptime.toFixed(1)}s`);
                        
                        if (!statusBadge.classList.contains('offline')) {
                            statusBadge.className = 'status-badge offline';
                            statusBadge.innerText = '🔴 Server Offline (Micro-Outage)';
                            await new Promise(r => setTimeout(r, 800)); 
                        }
                    }
                    
                    lastUptime = data.uptime;

                    if (!isCrashing) {
                        log(`PING /api/health -> 200 OK (Uptime: ${data.uptime.toFixed(1)}s)`);
                    }
                    
                    if (statusBadge.classList.contains('offline') || isCrashing) {
                        if (data.uptime < 5) {
                            statusBadge.className = 'status-badge healthy';
                            statusBadge.innerText = '🟢 Server Online';
                            
                            crashBtn.disabled = false;
                            crashBtn.innerText = '☢️ INITIATE FATAL CRASH';
                            
                            isCrashing = false; 
                            log('SYSTEM RECOVERED: Docker container restarted successfully.');
                        }
                    }
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                log(`PING /api/health -> FAILED (${error.message})`);
                
                if (statusBadge.classList.contains('healthy')) {
                    statusBadge.className = 'status-badge offline';
                    statusBadge.innerText = '🔴 Server Offline (502 Gateway)';
                    log('CONNECTION LOST: Caddy proxy reporting Bad Gateway.');
                }
            } finally {
                const nextTick = isCrashing ? 250 : 1500;
                setTimeout(pollHealth, nextTick);
            }
        }

        pollHealth();

        crashBtn.addEventListener('click', async () => {
            if (isCrashing) return;
            
            isCrashing = true;
            crashBtn.disabled = true;
            crashBtn.innerText = '💥 CRASH IN PROGRESS...';
            
            pauseToggle.checked = false; 
            
            log('WARNING: Sending kill command to Node.js backend...');
            
            try {
                const res = await fetch('/api/trigger-crash', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if(res.ok) {
                    const data = await res.json();
                    log(`SERVER RESPONSE: ${data.message}`);
                } else {
                    log(`ERROR: Could not send kill command. HTTP ${res.status}`);
                }
            } catch (e) {
                log(`ERROR: Network failed before command could finish.`);
            }
        });
    </script>
</body>
</html>
