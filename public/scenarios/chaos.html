<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilience Demo | 3 Dogs and a Frog</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .dashboard { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        h1 { margin-top: 0; color: #1a1a1a; }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; margin: 20px 0; transition: all 0.3s ease; }
        .healthy { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .offline { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .btn-danger { background-color: #dc3545; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 6px rgba(220, 53, 69, 0.3); width: 100%; margin-top: 20px;}
        .btn-danger:hover { background-color: #c82333; }
        .btn-danger:active { transform: translateY(2px); }
        .log-window { background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; text-align: left; margin-top: 20px; height: 150px; overflow-y: auto; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Chaos Engine: Resilience</h1>
        <p>Demonstrating Docker auto-recovery and Zero-Trust Edge routing.</p>
        
        <div id="statusBadge" class="status-badge healthy">
            🟢 Server Online
        </div>

        <button id="crashBtn" class="btn-danger">☢️ INITIATE FATAL CRASH</button>

        <div id="logWindow" class="log-window">
            > System initialized...<br>
            > Polling heartbeat endpoint...<br>
        </div>
    </div>

    <script>
        const statusBadge = document.getElementById('statusBadge');
        const crashBtn = document.getElementById('crashBtn');
        const logWindow = document.getElementById('logWindow');

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logWindow.innerHTML += `> [${time}] ${message}<br>`;
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        // Heartbeat Poller (Checks every 1.5 seconds)
        setInterval(async () => {
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    if (statusBadge.classList.contains('offline')) {
                        statusBadge.className = 'status-badge healthy';
                        statusBadge.innerText = '🟢 Server Online';
                        log('SYSTEM RECOVERED: Docker container restarted successfully.');
                    }
                } else {
                    throw new Error('502 Bad Gateway');
                }
            } catch (error) {
                if (statusBadge.classList.contains('healthy')) {
                    statusBadge.className = 'status-badge offline';
                    statusBadge.innerText = '🔴 Server Offline (502)';
                    log('CONNECTION LOST: Caddy proxy reporting Bad Gateway.');
                }
            }
        }, 1500);

        // Crash Trigger
        crashBtn.addEventListener('click', async () => {
            log('WARNING: Injecting fatal process.exit(1) command into Node.js...');
            try {
                // We don't await this because the server will literally sever the connection
                fetch('/api/trigger-crash', { method: 'POST' });
            } catch (e) {}
        });
    </script>
</body>
</html>
